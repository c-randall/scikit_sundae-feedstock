{% set name = "scikit-sundae" %}
{% set version = "1.1.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace("-", "_") }}-{{ version }}.tar.gz
  sha256: e3d06de0da6715d51310b2cea3835c495e6613d8c19ccbbf1f278aabe7e8f3d6

build:
  script:
    - export SUNDIALS_PREFIX=$PREFIX          # [not win]
    - set "SUNDIALS_PREFIX=%LIBRARY_PREFIX%"  # [win]
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - python  # [build_platform != target_platform]
    - setuptools  # [build_platform != target_platform]
    - cython  # [build_platform != target_platform]
    - numpy  # [build_platform != target_platform]
    - packaging  # [build_platform != target_platform]
    - sundials >=7.5,<7.6  # [build_platform != target_platform]
    - cross-python_{{ target_platform }}  # [build_platform != target_platform]
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
  host:
    - python
    - setuptools
    - cython
    - numpy
    - libblas
    - pip
    - sundials >=7.5,<7.6
  run:
    - python
    - numpy
    - scipy
    - sundials >=7.5,<7.6

test:
  imports:
    - numpy
    - scipy
    - sksundae

about:
  home: https://github.com/NREL/scikit-sundae
  summary: Python bindings to SUNDIALS differential algebraic equation solvers.
  description: |
    scikit-SUNDAE provides Python bindings to SUNDIALS integrators. Specifically,
    it interfaces with the IDA and CVODE solvers. These are capable of efficiently
    solving ordinary differential equations and differential algebraic equations.
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  doc_url: https://scikit-sundae.readthedocs.io/
  dev_url: https://github.com/NREL/scikit-sundae

extra:
  recipe-maintainers:
    - c-randall
